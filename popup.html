<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Paste</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <div class="tabs" role="tablist" aria-label="功能切换">
        <button id="tabClipboard" class="tab-btn active" type="button" role="tab" aria-selected="true" aria-controls="panelClipboard" data-tab="clipboard">剪贴板</button>
        <button id="tabNotes" class="tab-btn" type="button" role="tab" aria-selected="false" aria-controls="panelNotes" data-tab="notes">记事本</button>
      </div>

      <section id="panelClipboard" class="tab-panel active" role="tabpanel" aria-labelledby="tabClipboard">
        <div class="top-actions">
          <button id="openStandaloneBtn" class="open-project-btn" type="button">新标签打开</button>
          <button id="exportDataBtn" class="open-project-btn" type="button">导出数据</button>
          <button id="openProjectBtn" class="open-project-btn" type="button">打开项目</button>
        </div>
        <input id="searchInput" type="text" placeholder="搜索剪贴内容..." autocomplete="off" />
        <div id="list"></div>
      </section>

      <section id="panelNotes" class="tab-panel" role="tabpanel" aria-labelledby="tabNotes" hidden>
        <div class="note-compose">
          <input id="noteInput" type="text" placeholder="输入一条临时便签..." autocomplete="off" />
          <button id="addNoteBtn" class="add-note-btn" type="button">添加</button>
        </div>
        <ul id="noteList" class="note-list"></ul>
      </section>

      <div id="toast" aria-live="polite"></div>
    </div>
    <script src="config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
