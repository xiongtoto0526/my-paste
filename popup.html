<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Paste</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <div class="tabs" role="tablist" aria-label="功能切换">
        <button id="tabTools" class="tab-btn active" type="button" role="tab" aria-selected="true" aria-controls="panelTools" data-tab="tools">小工具</button>
        <button id="tabNotes" class="tab-btn" type="button" role="tab" aria-selected="false" aria-controls="panelNotes" data-tab="notes">记事本</button>
      </div>

      <section id="panelTools" class="tab-panel active" role="tabpanel" aria-labelledby="tabTools">
        <div class="tools-container">
          <!-- 小工具将在这里添加 -->
        </div>
      </section>

      <section id="panelNotes" class="tab-panel" role="tabpanel" aria-labelledby="tabNotes" hidden>
        <div class="note-compose">
          <input id="noteInput" type="text" placeholder="输入一条临时便签..." autocomplete="off" />
          <button id="addNoteBtn" class="add-note-btn" type="button">添加</button>
        </div>
        <ul id="noteList" class="note-list"></ul>
      </section>

      <div id="toast" aria-live="polite"></div>
    </div>
    <!-- 工具系统核心脚本 -->
    <script src="tools/base-tool.js"></script>
    <script src="tools/tools-manager.js"></script>
    <!-- 工具脚本 -->
    <script src="tools/example-tool.js"></script>
    <script src="tools/token-assistor-tool.js"></script>
    <!-- 主程序脚本 -->
    <script src="config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
